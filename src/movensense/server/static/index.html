<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movensense Data Browser</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    :root { --bg: #fafafa; --fg: #111; --accent: #2563eb; --border: #e5e7eb; --card: #fff; --muted: #6b7280; --success: #22c55e; --danger: #ef4444; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0f0f; --fg: #e5e5e5; --accent: #60a5fa; --border: #2a2a2a; --card: #1a1a1a; --muted: #9ca3af; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem; max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.2rem; color: var(--muted); margin-bottom: 1.5rem; font-weight: 400; }
    .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab { padding: 0.5rem 1rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .breadcrumb { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--muted); }
    .breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .card .meta { font-size: 0.8rem; color: var(--muted); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; background: var(--border); margin-right: 0.25rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    th { color: var(--muted); font-weight: 500; }
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .error { color: var(--danger); padding: 1rem; }
    button { padding: 0.5rem 1rem; border-radius: 0.375rem; border: 1px solid var(--border); background: var(--card); color: var(--fg); cursor: pointer; font-size: 0.875rem; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.danger { background: var(--danger); color: white; border-color: var(--danger); }
    input, select { padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--card); color: var(--fg); font-size: 0.875rem; }
    .stream-controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    .stream-status { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 1rem; }
    .stream-status.streaming { background: var(--success); color: white; }
    .stream-status.idle { background: var(--border); }
    .stream-status.error { background: var(--danger); color: white; }
    .chart-wrapper { margin-bottom: 1.5rem; }
    .chart-wrapper h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.25rem; }
    .channel-picker { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
    .channel-picker label { font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem; }
    #charts { min-height: 100px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 1rem; }
    .cal-header { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 0.25rem; font-weight: 500; }
    .cal-cell { text-align: center; padding: 0.5rem 0.25rem; border-radius: 0.375rem; border: 1px solid var(--border); font-size: 0.85rem; min-height: 2.5rem; }
    .cal-cell.cal-substantial { background: #22c55e22; border-color: #22c55e; color: var(--fg); cursor: pointer; }
    .cal-cell.cal-partial { background: #eab30822; border-color: #eab308; color: var(--fg); cursor: pointer; }
    .cal-cell.cal-substantial:hover, .cal-cell.cal-partial:hover { opacity: 0.8; }
    .cal-cell.empty { border-color: transparent; }
    .cal-summary { display: flex; gap: 1.5rem; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Movensense</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('data')">Data Browser</div>
    <div class="tab" onclick="switchTab('calendar')">Calendar</div>
    <div class="tab" onclick="switchTab('stream')">Live Stream</div>
  </div>

  <!-- Data Browser Tab -->
  <div id="tab-data">
    <h2 id="subtitle">Loading...</h2>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <main id="content"><div>Loading...</div></main>
  </div>

  <!-- Calendar Tab -->
  <div id="tab-calendar" style="display:none">
    <div class="stream-controls">
      <label>Device:
        <select id="cal-device" onchange="calendarView.setDevice(this.value)">
          <option value="">Select device...</option>
        </select>
      </label>
    </div>
    <div id="calendar-container"></div>
  </div>

  <!-- Live Stream Tab -->
  <div id="tab-stream" style="display:none">
    <div class="stream-controls">
      <input id="stream-serial" type="text" placeholder="Device serial" style="width:200px">
      <button onclick="connectDevice()" id="btn-connect">Connect</button>
      <span class="stream-status idle" id="stream-state">Idle</span>
    </div>
    <div id="device-info" style="display:none; margin-bottom:1rem;"></div>
    <div class="channel-picker" id="channel-picker"></div>
    <div class="stream-controls">
      <button class="primary" onclick="startStreaming()" id="btn-start" disabled>Start Streaming</button>
      <button class="danger" onclick="stopStreaming()" id="btn-stop" disabled>Stop</button>
      <label>Window:
        <select id="time-window" onchange="setTimeWindow()">
          <option value="5">5s</option>
          <option value="10" selected>10s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
        </select>
      </label>
    </div>
    <div id="stream-error" class="error" style="display:none"></div>
    <div id="charts"></div>
  </div>

  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="/static/timeseries.js"></script>
  <script src="/static/calendar.js"></script>
  <script src="/static/stream.js"></script>
  <script src="/static/app.js"></script>
  <script>
    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tabs .tab').forEach(t => {
        const text = t.textContent.toLowerCase();
        if ((tab === 'data' && text.includes('data')) || (tab === 'calendar' && text.includes('calendar')) || (tab === 'stream' && text.includes('stream'))) t.classList.add('active');
      });
      document.getElementById('tab-data').style.display = tab === 'data' ? '' : 'none';
      document.getElementById('tab-calendar').style.display = tab === 'calendar' ? '' : 'none';
      document.getElementById('tab-stream').style.display = tab === 'stream' ? '' : 'none';
      if (tab === 'calendar') initCalendar();
    }

    // Calendar init
    let calendarView = null;
    async function initCalendar() {
      if (!calendarView) {
        calendarView = new CalendarView('calendar-container', apiFetch, (serial, date) => {
          switchTab('data');
          showSessions(serial, date);
        });
      }
      // Populate device dropdown
      try {
        const data = await apiFetch('/devices');
        const sel = document.getElementById('cal-device');
        const current = sel.value;
        sel.innerHTML = '<option value="">Select device...</option>';
        for (const d of data.devices) {
          sel.innerHTML += `<option value="${d.serial}" ${d.serial === current ? 'selected' : ''}>${d.serial} (${d.date_count} days)</option>`;
        }
        if (!current && data.devices.length === 1) {
          sel.value = data.devices[0].serial;
          calendarView.setDevice(data.devices[0].serial);
        } else if (current) {
          calendarView.setDevice(current);
        }
      } catch (e) {}
    }

    // Streaming UI logic
    let streamClient = null;
    let chartManager = null;
    const CHANNELS = [
      { path: '/Meas/Ecg/200/mV', label: 'ECG 200Hz', rate: 200 },
      { path: '/Meas/Acc/52', label: 'ACC 52Hz', rate: 52 },
      { path: '/Meas/Gyro/52', label: 'GYRO 52Hz', rate: 52 },
      { path: '/Meas/Temp', label: 'Temp', rate: 1 },
      { path: '/Meas/HR', label: 'HR', rate: 1 },
      { path: '/Meas/IMU6/52', label: 'IMU6 52Hz', rate: 52 },
      { path: '/Meas/IMU9/52', label: 'IMU9 52Hz', rate: 52 },
    ];

    // Populate channel picker
    const picker = document.getElementById('channel-picker');
    CHANNELS.forEach(ch => {
      picker.innerHTML += `<label><input type="checkbox" value="${ch.path}" data-rate="${ch.rate}" ${ch.path.includes('Ecg') ? 'checked' : ''}> ${ch.label}</label>`;
    });

    function getSelectedChannels() {
      return [...document.querySelectorAll('#channel-picker input:checked')].map(el => ({
        path: el.value, rate: parseFloat(el.dataset.rate)
      }));
    }

    function updateState(state) {
      const el = document.getElementById('stream-state');
      el.textContent = state.charAt(0).toUpperCase() + state.slice(1);
      el.className = `stream-status ${state}`;
      document.getElementById('btn-start').disabled = state === 'streaming' || state === 'connecting';
      document.getElementById('btn-stop').disabled = state !== 'streaming';
    }

    function connectDevice() {
      const serial = document.getElementById('stream-serial').value.trim();
      if (!serial) { alert('Enter a device serial'); return; }
      if (streamClient) streamClient.disconnect();

      chartManager = new ChartManager('charts');
      streamClient = new StreamClient(
        (msg) => chartManager.addData(msg.channel, msg.values),
        (msg) => {
          if (msg.type === 'status') updateState(msg.state);
          if (msg.type === 'device_info') {
            document.getElementById('device-info').style.display = '';
            document.getElementById('device-info').innerHTML = `
              <div class="card"><h3>${msg.serial}</h3>
              <div class="meta">${msg.product_name} v${msg.app_version} | Battery: ${msg.battery}% | Logger: ${msg.datalogger_state}</div></div>`;
            document.getElementById('btn-start').disabled = false;
          }
        },
        (err) => {
          document.getElementById('stream-error').style.display = '';
          document.getElementById('stream-error').textContent = err;
          updateState('error');
        }
      );
      streamClient.connect();
    }

    function startStreaming() {
      const serial = document.getElementById('stream-serial').value.trim();
      const channels = getSelectedChannels();
      if (!channels.length) { alert('Select at least one channel'); return; }
      chartManager.clear();
      document.getElementById('stream-error').style.display = 'none';
      streamClient.startStream(serial, channels.map(c => c.path));
    }

    function stopStreaming() {
      if (streamClient) streamClient.stopStream();
    }

    function setTimeWindow() {
      if (chartManager) chartManager.setWindow(parseInt(document.getElementById('time-window').value));
    }
  </script>
</body>
</html>
