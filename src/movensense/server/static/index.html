<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movensense Data Browser</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    :root { --bg: #ffffff; --fg: #111; --accent: #2563eb; --border: #e5e7eb; --card: #fff; --muted: #6b7280; --success: #22c55e; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem; max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.2rem; color: var(--muted); margin-bottom: 1.5rem; font-weight: 400; }
    .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab { padding: 0.5rem 1rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .breadcrumb { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--muted); }
    .breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .card .meta { font-size: 0.8rem; color: var(--muted); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; background: var(--border); margin-right: 0.25rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    th { color: var(--muted); font-weight: 500; }
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .error { color: var(--danger); padding: 1rem; }
    button { padding: 0.5rem 1rem; border-radius: 0.375rem; border: 1px solid var(--border); background: var(--card); color: var(--fg); cursor: pointer; font-size: 0.875rem; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: white; border-color: var(--accent); }
    button.danger { background: var(--danger); color: white; border-color: var(--danger); }
    input, select { padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--card); color: var(--fg); font-size: 0.875rem; }
    .stream-controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    .stream-status { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 1rem; }
    .stream-status.streaming { background: var(--success); color: white; }
    .stream-status.idle { background: var(--border); }
    .stream-status.error { background: var(--danger); color: white; }
    .chart-wrapper { margin-bottom: 1.5rem; }
    .chart-wrapper h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.25rem; }
    .channel-picker { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
    .channel-picker label { font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem; }
    #charts { min-height: 100px; }
    /* Channel Viewer Layout */
    .cv-layout { display: grid; grid-template-columns: 180px 1fr; grid-template-rows: 1fr auto; gap: 0.5rem; min-height: 400px; }
    .cv-sidebar { grid-row: 1 / 3; overflow-y: auto; max-height: 80vh; border-right: 1px solid var(--border); padding-right: 0.5rem; }
    .cv-charts { overflow-y: auto; max-height: 70vh; }
    .cv-stats { grid-column: 2; border-top: 1px solid var(--border); padding-top: 0.5rem; min-height: 80px; }
    .ch-group { margin-bottom: 0.5rem; }
    .ch-group-label { font-size: 0.8rem; display: flex; align-items: center; gap: 0.25rem; cursor: pointer; }
    .ch-item { display: block; font-size: 0.75rem; padding-left: 1.2rem; cursor: pointer; }
    .ch-item input, .ch-group-label input { margin-right: 0.25rem; }
    .stats-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .stats-card { background: #f8f9fa; border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.8rem; min-width: 200px; flex: 1; }
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.5rem; }
    .config-item { background: #f8f9fa; border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
    .config-item label { flex: 1; display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }
    .config-item select { font-size: 0.8rem; padding: 0.2rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 1rem; }
    .cal-header { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 0.25rem; font-weight: 500; }
    .cal-cell { text-align: center; padding: 0.5rem 0.25rem; border-radius: 0.375rem; border: 1px solid var(--border); font-size: 0.85rem; min-height: 2.5rem; }
    .cal-cell.cal-substantial { background: #22c55e22; border-color: #22c55e; color: var(--fg); cursor: pointer; }
    .cal-cell.cal-partial { background: #eab30822; border-color: #eab308; color: var(--fg); cursor: pointer; }
    .cal-cell.cal-substantial:hover, .cal-cell.cal-partial:hover { opacity: 0.8; }
    .cal-cell.empty { border-color: transparent; }
    .cal-summary { display: flex; gap: 1.5rem; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Movensense</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('data')">Data Browser</div>
    <div class="tab" onclick="switchTab('calendar')">Calendar</div>
    <div class="tab" onclick="switchTab('stream')">Live Stream</div>
  </div>

  <!-- Data Browser Tab -->
  <div id="tab-data">
    <h2 id="subtitle">Loading...</h2>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <main id="content"><div>Loading...</div></main>
  </div>

  <!-- Calendar Tab -->
  <div id="tab-calendar" style="display:none">
    <div class="stream-controls">
      <label>Device:
        <select id="cal-device" onchange="calendarView.setDevice(this.value)">
          <option value="">Select device...</option>
        </select>
      </label>
    </div>
    <div id="calendar-container"></div>
  </div>

  <!-- Live Stream Tab -->
  <div id="tab-stream" style="display:none">
    <!-- Connection -->
    <div class="stream-controls">
      <input id="stream-serial" type="text" placeholder="Device serial" style="width:200px">
      <button onclick="connectDevice()" id="btn-connect">Connect</button>
      <span class="stream-status idle" id="stream-state">Not connected</span>
    </div>
    <div id="stream-error" class="error" style="display:none"></div>

    <!-- Everything below is hidden until connected -->
    <div id="device-connected-panel" style="display:none">
      <div id="device-info" style="margin:0.75rem 0;"></div>

      <!-- Current Config (read from device) -->
      <div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;">Device Configuration</div>
      <div id="current-config-display" style="font-size:0.8rem;color:#666;margin-bottom:0.5rem;"></div>

      <!-- Config Editor -->
      <div id="config-panel">
        <div id="config-channels" class="config-grid"></div>
        <div id="config-readonly-msg" style="display:none;font-size:0.8rem;color:#f59e0b;margin:0.5rem 0;">
          ⚠ Device is logging. Stop logging to change configuration.
        </div>
        <div class="stream-controls" style="margin-top:0.5rem;">
          <input id="config-confirm" type="text" placeholder='Type "confirm" to apply changes' style="width:250px" disabled>
          <button onclick="applyConfig()" id="btn-config" disabled>Apply Config</button>
        </div>
      </div>

      <hr style="border-color:var(--border);margin:0.75rem 0">

      <!-- Logging Control -->
      <div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;">Logging Control</div>
      <div class="stream-controls">
        <button onclick="startLogging()" id="btn-start-log" disabled>Start Logging</button>
        <button onclick="stopLogging()" id="btn-stop-log" class="danger" disabled>Stop Logging</button>
      </div>

      <hr style="border-color:var(--border);margin:0.75rem 0">

      <!-- Live Streaming -->
      <div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem;">Live Data Stream</div>
      <div class="stream-controls">
        <button class="primary" onclick="startStreaming()" id="btn-start" disabled>Start Streaming</button>
        <button class="danger" onclick="stopStreaming()" id="btn-stop" disabled>Stop Streaming</button>
        <label>Window:
          <select id="time-window" onchange="setTimeWindow()">
            <option value="5">5s</option>
            <option value="10" selected>10s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
          </select>
        </label>
      </div>
      <div id="charts"></div>
    </div>
  </div>

  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script>
    // Global init — shared by all modules
    const API = '/api';
    const _params = new URLSearchParams(window.location.search);
    const TOKEN = _params.get('token') || sessionStorage.getItem('ms_token') || '';
    if (TOKEN) sessionStorage.setItem('ms_token', TOKEN);

    async function apiFetch(path) {
      const resp = await fetch(API + path, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      if (resp.status === 401) {
        throw new Error('Authentication failed. Check your token.');
      }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      return resp.json();
    }
  </script>
  <script src="/static/channel-viewer.js"></script>
  <script src="/static/calendar.js"></script>
  <script src="/static/stream.js"></script>
  <script src="/static/app.js"></script>
  <script>
    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tabs .tab').forEach(t => {
        const text = t.textContent.toLowerCase();
        if ((tab === 'data' && text.includes('data')) || (tab === 'calendar' && text.includes('calendar')) || (tab === 'stream' && text.includes('stream'))) t.classList.add('active');
      });
      document.getElementById('tab-data').style.display = tab === 'data' ? '' : 'none';
      document.getElementById('tab-calendar').style.display = tab === 'calendar' ? '' : 'none';
      document.getElementById('tab-stream').style.display = tab === 'stream' ? '' : 'none';
      if (tab === 'calendar') initCalendar();
    }

    // Calendar init
    let calendarView = null;
    async function initCalendar() {
      if (!calendarView) {
        calendarView = new CalendarView('calendar-container', apiFetch, (serial, date) => {
          switchTab('data');
          showSessions(serial, date);
        });
      }
      // Populate device dropdown
      try {
        const data = await apiFetch('/devices');
        const sel = document.getElementById('cal-device');
        const current = sel.value;
        sel.innerHTML = '<option value="">Select device...</option>';
        for (const d of data.devices) {
          sel.innerHTML += `<option value="${d.serial}" ${d.serial === current ? 'selected' : ''}>${d.serial} (${d.date_count} days)</option>`;
        }
        if (!current && data.devices.length === 1) {
          sel.value = data.devices[0].serial;
          calendarView.setDevice(data.devices[0].serial);
        } else if (current) {
          calendarView.setDevice(current);
        }
      } catch (e) {}
    }

    // === Live Stream Tab Logic ===
    let streamClient = null;
    let chartManager = null;
    let connectedSerial = null;
    let deviceState = null; // 1=Unknown, 2=Ready, 3=Logging

    const MEASUREMENTS = [
      { id: 'ecg', label: 'ECG', pathTemplate: '/Meas/Ecg/{rate}/mV', rates: [125, 128, 200, 250, 256, 500, 512], defaultRate: 200 },
      { id: 'acc', label: 'Accelerometer', pathTemplate: '/Meas/Acc/{rate}', rates: [13, 26, 52, 104, 208, 416, 833], defaultRate: 52 },
      { id: 'gyro', label: 'Gyroscope', pathTemplate: '/Meas/Gyro/{rate}', rates: [13, 26, 52, 104, 208, 416, 833], defaultRate: 52 },
      { id: 'magn', label: 'Magnetometer', pathTemplate: '/Meas/Magn/{rate}', rates: [13, 26, 52, 104, 208, 416, 833], defaultRate: 13 },
      { id: 'imu6', label: 'IMU 6-axis', pathTemplate: '/Meas/IMU6/{rate}', rates: [13, 26, 52, 104, 208, 416, 833], defaultRate: 52 },
      { id: 'imu9', label: 'IMU 9-axis', pathTemplate: '/Meas/IMU9/{rate}', rates: [13, 26, 52, 104, 208, 416, 833], defaultRate: 52 },
      { id: 'temp', label: 'Temperature', pathTemplate: '/Meas/Temp', rates: [], defaultRate: null },
      { id: 'hr', label: 'Heart Rate', pathTemplate: '/Meas/HR', rates: [], defaultRate: null },
    ];

    // Build config panel
    function buildConfigPanel() {
      const el = document.getElementById('config-channels');
      el.innerHTML = '';
      MEASUREMENTS.forEach(m => {
        let rateHtml = '';
        if (m.rates.length > 0) {
          rateHtml = `<select id="rate-${m.id}">${m.rates.map(r => `<option value="${r}" ${r === m.defaultRate ? 'selected' : ''}>${r} Hz</option>`).join('')}</select>`;
        }
        el.innerHTML += `<div class="config-item">
          <label><input type="checkbox" id="cfg-${m.id}"> ${m.label}</label>
          ${rateHtml}
        </div>`;
      });
    }
    buildConfigPanel();

    // Enable config confirm button only when "confirm" is typed
    document.getElementById('config-confirm').addEventListener('input', (e) => {
      document.getElementById('btn-config').disabled = e.target.value.trim().toLowerCase() !== 'confirm';
    });

    function getSelectedConfig() {
      const paths = [];
      MEASUREMENTS.forEach(m => {
        const chk = document.getElementById(`cfg-${m.id}`);
        if (chk && chk.checked) {
          let path = m.pathTemplate;
          if (m.rates.length > 0) {
            const sel = document.getElementById(`rate-${m.id}`);
            path = path.replace('{rate}', sel ? sel.value : m.defaultRate);
          }
          paths.push(path);
        }
      });
      return paths;
    }

    function updateDeviceUI(info) {
      deviceState = info.dlstate;
      const isLogging = deviceState === 3;

      // Show connected panel
      document.getElementById('device-connected-panel').style.display = '';

      // Device info
      const memInfo = info.memory_full
        ? '<span style="color:#ef4444">⚠ Memory FULL — logging stopped</span>'
        : `Storage: ${(info.total_log_size_bytes / 1024).toFixed(0)} KB used`;
      document.getElementById('device-info').innerHTML = `
        <div class="card"><h3>${info.serial}</h3>
        <div class="meta">${info.product_name} v${info.app_version} | Battery: ${info.battery}% | State: ${info.datalogger_state} | ${memInfo}</div></div>`;

      // Current config
      const configDisplay = document.getElementById('current-config-display');
      if (info.current_config) {
        const paths = info.current_config.split('\0').filter(p => p);
        configDisplay.innerHTML = `<strong>Current config:</strong> ${paths.join(', ')}`;
      } else {
        configDisplay.innerHTML = '<em>No configuration set</em>';
      }

      // Config editor state
      const readonlyMsg = document.getElementById('config-readonly-msg');
      const confirmInput = document.getElementById('config-confirm');
      if (isLogging) {
        readonlyMsg.style.display = '';
        confirmInput.disabled = true;
        document.getElementById('btn-config').disabled = true;
        // Disable all checkboxes and selects
        document.querySelectorAll('#config-channels input, #config-channels select').forEach(el => el.disabled = true);
      } else {
        readonlyMsg.style.display = 'none';
        confirmInput.disabled = false;
        confirmInput.value = '';
        document.querySelectorAll('#config-channels input, #config-channels select').forEach(el => el.disabled = false);
      }

      // Logging buttons
      document.getElementById('btn-start-log').disabled = isLogging;
      document.getElementById('btn-stop-log').disabled = !isLogging;

      // Streaming buttons
      document.getElementById('btn-start').disabled = false;

      // Connection status
      const stateEl = document.getElementById('stream-state');
      stateEl.textContent = `Connected (${info.datalogger_state})`;
      stateEl.className = 'stream-status ' + (isLogging ? 'streaming' : 'idle');
    }

    async function connectDevice() {
      const serial = document.getElementById('stream-serial').value.trim();
      if (!serial) { alert('Enter a device serial'); return; }

      document.getElementById('stream-error').style.display = 'none';
      document.getElementById('stream-state').textContent = 'Connecting...';

      try {
        const resp = await fetch('/api/device/connect', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial }),
        });
        if (!resp.ok) throw new Error((await resp.json()).detail || 'Connect failed');
        const info = await resp.json();
        connectedSerial = serial;
        updateDeviceUI(info);

        // Setup WebSocket for streaming
        chartManager = new ChartManager('charts');
        streamClient = new StreamClient(
          (msg) => chartManager.addData(msg.channel, msg.values),
          (msg) => { if (msg.type === 'status' && msg.state === 'streaming') { document.getElementById('btn-stop').disabled = false; } },
          (err) => { document.getElementById('stream-error').style.display = ''; document.getElementById('stream-error').textContent = err; }
        );
        streamClient.connect();
      } catch (e) {
        document.getElementById('stream-error').style.display = '';
        document.getElementById('stream-error').textContent = e.message;
        document.getElementById('stream-state').textContent = 'Connection failed';
        document.getElementById('stream-state').className = 'stream-status error';
      }
    }

    async function applyConfig() {
      const paths = getSelectedConfig();
      if (!paths.length) { alert('Select at least one measurement'); return; }
      try {
        const resp = await fetch('/api/device/config', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial: connectedSerial, paths }),
        });
        if (!resp.ok) throw new Error((await resp.json()).detail || 'Config failed');
        document.getElementById('config-confirm').value = '';
        document.getElementById('btn-config').disabled = true;
        document.getElementById('current-config-display').innerHTML = `<strong>Current config:</strong> ${paths.join(', ')}`;
        alert('Configuration applied successfully');
      } catch (e) {
        document.getElementById('stream-error').style.display = '';
        document.getElementById('stream-error').textContent = e.message;
      }
    }

    async function startLogging() {
      try {
        const resp = await fetch('/api/device/start', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial: connectedSerial }),
        });
        if (!resp.ok) throw new Error((await resp.json()).detail || 'Start failed');
        deviceState = 3;
        document.getElementById('btn-start-log').disabled = true;
        document.getElementById('btn-stop-log').disabled = false;
        document.getElementById('stream-state').textContent = 'Connected (Logging)';
        document.getElementById('stream-state').className = 'stream-status streaming';
        // Lock config
        document.getElementById('config-readonly-msg').style.display = '';
        document.querySelectorAll('#config-channels input, #config-channels select').forEach(el => el.disabled = true);
        document.getElementById('config-confirm').disabled = true;
      } catch (e) {
        document.getElementById('stream-error').style.display = '';
        document.getElementById('stream-error').textContent = e.message;
      }
    }

    async function stopLogging() {
      try {
        const resp = await fetch('/api/device/stop', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ serial: connectedSerial }),
        });
        if (!resp.ok) throw new Error((await resp.json()).detail || 'Stop failed');
        deviceState = 2;
        document.getElementById('btn-start-log').disabled = false;
        document.getElementById('btn-stop-log').disabled = true;
        document.getElementById('stream-state').textContent = 'Connected (Ready)';
        document.getElementById('stream-state').className = 'stream-status idle';
        // Unlock config
        document.getElementById('config-readonly-msg').style.display = 'none';
        document.querySelectorAll('#config-channels input, #config-channels select').forEach(el => el.disabled = false);
        document.getElementById('config-confirm').disabled = false;
      } catch (e) {
        document.getElementById('stream-error').style.display = '';
        document.getElementById('stream-error').textContent = e.message;
      }
    }

    function startStreaming() {
      const channels = getSelectedConfig();
      if (!channels.length) { alert('Select at least one channel in config'); return; }
      chartManager.clear();
      document.getElementById('stream-error').style.display = 'none';
      streamClient.startStream(connectedSerial, channels);
      document.getElementById('btn-stop').disabled = false;
    }

    function stopStreaming() {
      if (streamClient) streamClient.stopStream();
      document.getElementById('btn-stop').disabled = true;
    }

    function setTimeWindow() {
      if (chartManager) chartManager.setWindow(parseInt(document.getElementById('time-window').value));
    }
  </script>
</body>
</html>
