<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movesense Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 1rem; max-width: 1400px; margin: 0 auto; color: #1a1a2e; }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .device-list { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .device-btn { padding: 0.4rem 1rem; border: 1px solid #ddd; border-radius: 0.25rem; cursor: pointer; font-size: 0.85rem; background: #f9f9f9; }
    .device-btn:hover { background: #e5e7eb; }
    .device-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    #controls { margin-bottom: 0.5rem; }
    #charts { width: 100%; }
    .error { color: #ef4444; font-size: 0.85rem; margin: 0.5rem 0; }
    .status { font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>
  <h1>Movesense Viewer</h1>
  <div id="device-list" class="device-list">Loading devices...</div>
  <div id="controls"></div>
  <div id="status" class="status"></div>
  <div id="charts"></div>

  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="/static/viewer.js?v=20260408e"></script>
  <script>
    const _params = new URLSearchParams(window.location.search);
    const TOKEN = _params.get('token') || sessionStorage.getItem('ms_token') || '';
    if (TOKEN) sessionStorage.setItem('ms_token', TOKEN);

    let viewer = null;
    let chartRenderer = null;
    let controlPanel = null;
    let currentSerial = null;

    // Load device list via REST (metadata, not chart data)
    async function loadDevices() {
      try {
        const resp = await fetch('/api/devices', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
        if (!resp.ok) throw new Error('Auth failed');
        const data = await resp.json();
        const el = document.getElementById('device-list');
        if (!data.devices.length) {
          el.innerHTML = '<span class="error">No data. Run <code>movesense fetch</code> first.</span>';
          return;
        }
        el.innerHTML = data.devices.map(d =>
          `<button class="device-btn" onclick="selectDevice('${d.serial}', this)">${d.serial}<br><span style="font-size:0.7rem;color:#999">${d.date_count} dates</span></button>`
        ).join('');
      } catch (e) {
        document.getElementById('device-list').innerHTML = `<span class="error">${e.message}</span>`;
      }
    }

    function selectDevice(serial, btn) {
      // Highlight selected
      document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      currentSerial = serial;

      // Setup chart renderer
      if (chartRenderer) chartRenderer.clear();
      chartRenderer = new ChartRenderer('charts');
      window.chartRenderer = chartRenderer;

      // Setup control panel
      controlPanel = new ControlPanel('controls');
      window.controlPanel = controlPanel;
      controlPanel.onChannelToggle = (channels) => {
        if (viewer) viewer.subscribe(channels);
      };

      // Connect viewer WebSocket
      if (viewer && viewer.ws) viewer.ws.close();
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      viewer = new ViewerClient(`${proto}//${location.host}/ws/viewer?token=${TOKEN}`);

      viewer.onMetadata = (meta) => {
        controlPanel.buildFromMetadata(meta);
        document.getElementById('status').textContent =
          `${meta.sessions?.length || 0} sessions | ${meta.channels?.length || 0} channels | ${meta.state}`;
      };

      viewer.onData = (pkt) => {
        chartRenderer.update(pkt);
      };

      viewer.onStatus = (status) => {
        controlPanel.updateStatus(status);
        document.getElementById('status').textContent = status.state || 'unknown';
      };

      viewer.onError = (msg) => {
        document.getElementById('status').innerHTML = `<span class="error">${msg}</span>`;
      };

      // Zoom handler: check prefetch buffer, then request from server
      let _lastZoomRange = null;
      chartRenderer.onZoom = (startS, endS) => {
        if (viewer && controlPanel && controlPanel.metadata) {
          const tr = controlPanel.metadata.time_range;
          if (tr && tr.start_us) {
            const startUs = tr.start_us + Math.round(startS * 1e6);
            const endUs = tr.start_us + Math.round(endS * 1e6);

            // Invalidate buffer on >2x zoom change
            if (_lastZoomRange) {
              const oldRange = _lastZoomRange[1] - _lastZoomRange[0];
              const newRange = endUs - startUs;
              if (oldRange / newRange > 2 || newRange / oldRange > 2) {
                viewer.clearBuffer();
              }
            }
            _lastZoomRange = [startUs, endUs];

            // Check prefetch buffer for each selected channel
            const selected = controlPanel.getSelected();
            let allBuffered = true;
            for (const ch of selected) {
              const cached = viewer.checkBuffer(ch, startS, endS);
              if (cached) {
                chartRenderer.update(cached);
              } else {
                allBuffered = false;
              }
            }
            // Request from server if not fully buffered
            if (!allBuffered) {
              viewer.setView(startUs, endUs, chartRenderer.container.clientWidth || 1200);
            }
          }
        }
      };

      console.log('Connecting viewer WebSocket...');
      viewer.connect();
      // Wait for WS to open before sending
      viewer.ws.addEventListener('open', () => {
        console.log('WebSocket open, selecting device:', serial);
        viewer.selectDevice(serial);
      });
      viewer.ws.addEventListener('error', (e) => console.error('WS error:', e));
      viewer.ws.addEventListener('close', (e) => console.log('WS closed:', e.code, e.reason));
    }

    function resetZoom() {
      if (viewer && controlPanel && controlPanel.metadata) {
        const tr = controlPanel.metadata.time_range;
        if (tr) viewer.setView(tr.start_us, tr.end_us, chartRenderer?.container?.clientWidth || 1200);
      }
    }

    // Responsive resize
    window.addEventListener('resize', () => { if (chartRenderer) chartRenderer.resize(); });

    // Init
    if (!TOKEN) {
      document.getElementById('device-list').innerHTML = '<span class="error">No token. Use the URL from <code>movesense serve</code>.</span>';
    } else {
      loadDevices();
    }
  </script>
</body>
</html>
