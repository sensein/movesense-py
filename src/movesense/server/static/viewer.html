<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movesense Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 1rem; max-width: 1600px; margin: 0 auto; color: #1a1a2e; }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .device-list { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .device-btn { padding: 0.4rem 1rem; border: 1px solid #ddd; border-radius: 0.25rem; cursor: pointer; font-size: 0.85rem; background: #f9f9f9; }
    .device-btn:hover { background: #e5e7eb; }
    .device-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .error { color: #ef4444; font-size: 0.85rem; margin: 0.5rem 0; }
    .status { font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>
  <!-- Busy overlay -->
  <div id="busy-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:center;">
    <div style="background:white;padding:2rem 3rem;border-radius:0.75rem;text-align:center;font-size:1rem;" id="busy-msg">Working...</div>
  </div>
  <!-- Confirmation overlay -->
  <div id="confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9998;justify-content:center;align-items:center;">
    <div style="background:white;padding:1.5rem 2rem;border-radius:0.75rem;max-width:400px;width:90%;">
      <div id="confirm-title" style="font-weight:600;margin-bottom:0.5rem;"></div>
      <div id="confirm-body" style="font-size:0.85rem;color:#666;margin-bottom:0.75rem;"></div>
      <div id="confirm-input-wrap" style="display:none;margin-bottom:0.75rem;">
        <input id="confirm-input" type="text" style="width:100%;padding:0.4rem;font-size:0.85rem;border:1px solid #ddd;border-radius:0.25rem;" autocomplete="off">
      </div>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
        <button onclick="respondConfirm(false)" style="padding:0.4rem 1rem;">Cancel</button>
        <button id="confirm-ok-btn" onclick="respondConfirm(true)" style="padding:0.4rem 1rem;background:#ef4444;color:white;border:none;border-radius:0.25rem;">Confirm</button>
      </div>
    </div>
  </div>

  <h1>Movesense Viewer</h1>
  <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;">
    <div id="device-list" class="device-list"></div>
    <button id="btn-play" onclick="setMode('live')" class="device-btn" style="font-size:0.85rem;display:none;background:#22c55e;color:white;border-color:#22c55e;" title="Start live streaming">▶</button>
    <button id="btn-pause" onclick="pauseLive()" class="device-btn" style="font-size:0.85rem;display:none;background:#f59e0b;color:white;border-color:#f59e0b;" title="Pause display">⏸</button>
    <button id="btn-stop" onclick="setMode('stored')" class="device-btn" style="font-size:0.85rem;display:none;background:#ef4444;color:white;border-color:#ef4444;" title="Stop live streaming">⏹</button>
    <button onclick="toggleSettings()" class="device-btn" style="font-size:0.85rem;" title="Settings">⚙ Settings</button>
  </div>
  <div id="controls"></div>
  <div id="status" class="status"></div>
  <div id="charts" style="width:100%;"></div>

  <!-- Settings panel (slide-out) -->
  <div id="settings-panel" style="display:none;position:fixed;right:0;top:0;bottom:0;width:320px;background:white;box-shadow:-2px 0 8px rgba(0,0,0,0.15);z-index:100;padding:1rem;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h3 style="font-size:1rem;">Settings</h3>
      <button onclick="toggleSettings()" style="font-size:1.2rem;background:none;border:none;cursor:pointer;">✕</button>
    </div>
    <!-- Connection -->
    <div style="margin-bottom:1rem;">
      <div style="font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Connection</div>
      <div style="display:flex;gap:0.25rem;">
        <input id="settings-serial" type="text" placeholder="Device serial" style="flex:1;padding:0.3rem;font-size:0.8rem;">
        <button onclick="deviceConnect()" id="btn-device-connect" style="font-size:0.75rem;padding:0.3rem 0.5rem;">Connect</button>
      </div>
      <div id="device-info" style="font-size:0.75rem;color:#666;margin-top:0.25rem;"></div>
    </div>
    <!-- Logging Config -->
    <div id="logging-config-section" style="margin-bottom:1rem;display:none;">
      <div style="font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Logging Config</div>
      <div id="logging-channels" style="font-size:0.8rem;"></div>
      <button onclick="applyLoggingConfig()" id="btn-apply-config" style="font-size:0.75rem;margin-top:0.25rem;">Apply Config</button>
    </div>
    <!-- Recording -->
    <div id="recording-section" style="margin-bottom:1rem;display:none;">
      <div style="font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Recording</div>
      <button onclick="toggleRecording()" id="btn-record" style="font-size:0.75rem;">🔴 Record</button>
    </div>
    <!-- Data Management -->
    <div id="data-mgmt-section" style="margin-bottom:1rem;display:none;">
      <div style="font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Data Management</div>
      <button onclick="fetchLogs()" style="font-size:0.75rem;">Download Logs</button>
      <button onclick="eraseMem()" style="font-size:0.75rem;color:#ef4444;">Erase Memory</button>
    </div>
    <!-- Stream Config -->
    <div id="stream-config-section" style="margin-bottom:1rem;display:none;">
      <div style="font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Stream Channels (for Live mode)</div>
      <div id="stream-channels" style="font-size:0.8rem;"></div>
      <button onclick="applyStreamConfig()" style="font-size:0.75rem;margin-top:0.25rem;">Apply Stream Config</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="/static/viewer.js?v=20260408t"></script>
  <script>
    const _params = new URLSearchParams(window.location.search);
    const TOKEN = _params.get('token') || sessionStorage.getItem('ms_token') || '';
    if (TOKEN) sessionStorage.setItem('ms_token', TOKEN);

    let viewer = null;
    let chartRenderer = null;
    let controlPanel = null;

    async function loadDevices() {
      try {
        const resp = await fetch('/api/devices', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
        if (!resp.ok) throw new Error('Auth failed');
        const data = await resp.json();
        const el = document.getElementById('device-list');
        if (!data.devices.length) {
          el.innerHTML = '<span class="error">No data. Run <code>movesense fetch</code> first.</span>';
          return;
        }
        el.innerHTML = data.devices.map(d =>
          `<button class="device-btn" onclick="selectDevice('${d.serial}', this)">${d.serial}<br><span style="font-size:0.7rem;color:#999">${d.date_count} dates</span></button>`
        ).join('');
        // Pre-fill settings serial with first device
        if (data.devices.length > 0 && !document.getElementById('settings-serial').value) {
          document.getElementById('settings-serial').value = data.devices[0].serial;
        }
      } catch (e) {
        document.getElementById('device-list').innerHTML = `<span class="error">${e.message}</span>`;
      }
    }

    function selectDevice(serial, btn) {
      document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      if (chartRenderer) chartRenderer.clear();
      // Close existing viewer WS if switching devices
      if (viewer && viewer.ws) { viewer.ws.close(); viewer = null; }
      ensureViewer();
      document.getElementById('settings-serial').value = serial;

      viewer.ws.addEventListener('open', () => {
        viewer.selectDevice(serial);
      }, { once: true });
      // If already open
      if (viewer.ws.readyState === WebSocket.OPEN) {
        viewer.selectDevice(serial);
      }
    }

    // --- Mode toggle ---
    let _currentMode = 'stored';
    function setMode(mode) {
      if (!viewer) return;
      // Play/stop are separate buttons now — no toggle needed
      _currentMode = mode;
      if (mode === 'live') {
        // Get stream channels from settings panel and send to server
        const streamChannels = getStreamChannels();
        if (!streamChannels.length) {
          document.getElementById('status').innerHTML = '<span class="error">Configure stream channels in Settings first</span>';
          return;
        }
        // Send stream_config BEFORE mode switch so server knows which channels
        viewer.send({ type: 'stream_config', channels: streamChannels });
        chartRenderer.clear();
        chartRenderer.enterLiveMode(streamChannels);
        document.getElementById('btn-play').style.display = 'none';
        document.getElementById('btn-pause').style.display = '';
        document.getElementById('btn-stop').style.display = '';
      } else {
        chartRenderer.enterStoredMode();
        document.getElementById('btn-play').style.display = '';
        document.getElementById('btn-pause').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'none';
      }
      viewer.send({ type: 'mode', mode });
    }

    function getStreamChannels() {
      const channels = [];
      for (const ch of ALL_CH_IDS) {
        const chk = document.getElementById('stream-' + ch);
        if (chk?.checked) {
          let path = CH_TEMPLATES[ch];
          const rateSel = document.getElementById('stream-rate-' + ch);
          if (rateSel) path = path.replace('{rate}', rateSel.value);
          channels.push(path);
        }
      }
      return channels;
    }

    // --- Settings panel ---
    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      panel.style.display = panel.style.display === 'none' ? '' : 'none';
    }

    function ensureViewer() {
      // Create viewer WebSocket if not already connected
      if (viewer && viewer.ws && viewer.ws.readyState === WebSocket.OPEN) return;
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      viewer = new ViewerClient(`${proto}//${location.host}/ws/viewer?token=${TOKEN}`);

      if (!chartRenderer) {
        chartRenderer = new ChartRenderer('charts');
        window.chartRenderer = chartRenderer;
      }
      if (!controlPanel) {
        controlPanel = new ControlPanel('controls');
        window.controlPanel = controlPanel;
        controlPanel.onChannelToggle = (channels) => { if (viewer) viewer.subscribe(channels); };
      }

      viewer.onMetadata = (meta) => {
        controlPanel.buildFromMetadata(meta);
        chartRenderer._sessions = meta.sessions || [];
        document.getElementById('status').textContent =
          `${meta.sessions?.length || 0} sessions | ${meta.channels?.length || 0} channels | ${meta.state}`;
      };
      viewer.onData = (pkt) => { chartRenderer.update(pkt); };
      viewer.onStatus = (msg) => {
        if (msg.type === 'busy') {
          document.getElementById('busy-msg').textContent = msg.message || 'Working...';
          document.getElementById('busy-overlay').style.display = 'flex';
        } else if (msg.type === 'busy_done') {
          document.getElementById('busy-overlay').style.display = 'none';
        } else if (msg.type === 'confirm') {
          showConfirm(msg.title, msg.body, msg.require_text);
        } else if (msg.type === 'device_status') {
          updateDeviceStatus(msg);
        } else if (msg.type === 'mode_changed') {
          _currentMode = msg.mode;
          if (msg.mode === 'stored') {
            document.getElementById('btn-play').style.display = '';
            document.getElementById('btn-stop').style.display = 'none';
            if (controlPanel) controlPanel.buildFromMetadata(controlPanel.metadata);
          } else if (msg.mode === 'live') {
            const streamChs = new Set(msg.streaming_channels || []);
            updateChannelCheckboxesForLive(streamChs);
          }
        } else {
          controlPanel?.updateStatus(msg);
          document.getElementById('status').textContent = msg.state || '';
        }
      };
      viewer.onError = (msg) => {
        document.getElementById('busy-overlay').style.display = 'none';
        document.getElementById('status').innerHTML = `<span class="error">${msg}</span>`;
      };
      chartRenderer.onViewChange = (startUtcS, endUtcS) => {
        if (!viewer) return;
        const range = endUtcS - startUtcS;
        if (range < 600) {
          viewer.setView(Math.round(startUtcS * 1e6), Math.round(endUtcS * 1e6), chartRenderer.container.clientWidth || 1200);
        }
      };

      viewer.connect();
    }

    function deviceConnect() {
      const serial = document.getElementById('settings-serial').value.trim();
      if (!serial) return;
      ensureViewer();
      // Wait for WS open then send
      if (viewer.ws.readyState === WebSocket.OPEN) {
        viewer.send({ type: 'device_connect', serial });
      } else {
        viewer.ws.addEventListener('open', () => {
          viewer.send({ type: 'device_connect', serial });
        }, { once: true });
      }
    }

    function updateDeviceStatus(s) {
      const info = document.getElementById('device-info');
      if (s.connected) {
        const memStr = s.memory_full ? '<span style="color:#ef4444">FULL</span>' : `${s.memory_pct ?? 0}% used`;
        info.innerHTML = `🔋 ${s.battery ?? '?'}% | v${s.firmware ?? '?'} | ${s.dlstate_name ?? '?'} | ${memStr} | ${s.log_count ?? 0} logs (${((s.total_log_bytes || 0) / 1024).toFixed(0)} KB)`;
        // Show live button (next to device buttons)
        document.getElementById('btn-play').style.display = '';
        // Show config/recording/data sections
        document.getElementById('logging-config-section').style.display = '';
        document.getElementById('recording-section').style.display = '';
        document.getElementById('data-mgmt-section').style.display = '';
        document.getElementById('stream-config-section').style.display = '';
        // Update record button
        const isLogging = s.dlstate === 3;
        document.getElementById('btn-record').innerHTML = isLogging ? '⏹ Stop' : '🔴 Record';
        document.getElementById('btn-record').className = isLogging ? 'danger' : '';
        // Build channel checkboxes from capabilities
        if (s.capabilities) buildConfigCheckboxes(s.capabilities, s.logging_config);
      } else {
        info.textContent = 'Not connected';
        document.getElementById('btn-play').style.display = 'none'; document.getElementById('btn-stop').style.display = 'none';
      }
    }

    function buildConfigCheckboxes(capabilities, loggingConfig) {
      const logPaths = (loggingConfig?.paths || []).map(p => p.toLowerCase());
      const defaultStream = ['ecg', 'imu9', 'temp', 'hr'];
      const logEl = document.getElementById('logging-channels');
      const streamEl = document.getElementById('stream-channels');
      let logHtml = '', streamHtml = '';
      const channels = [
        { id: 'ecg', label: 'ECG (mV)', path: '/Meas/Ecg/{rate}/mV', rates: capabilities.ecg?.rates || [125, 200, 250, 500, 512] },
        { id: 'acc', label: 'Accelerometer (m/s²)', path: '/Meas/Acc/{rate}', rates: capabilities.acc?.rates || [13, 26, 52, 104, 208] },
        { id: 'gyro', label: 'Gyroscope (dps)', path: '/Meas/Gyro/{rate}', rates: capabilities.gyro?.rates || [13, 26, 52, 104, 208] },
        { id: 'magn', label: 'Magnetometer (µT)', path: '/Meas/Magn/{rate}', rates: capabilities.magn?.rates || [13, 26, 52, 104, 208] },
        { id: 'imu6', label: 'IMU 6-axis (Acc+Gyro)', path: '/Meas/IMU6/{rate}', rates: capabilities.imu6?.rates || capabilities.acc?.rates || [13, 26, 52, 104, 208] },
        { id: 'imu9', label: 'IMU 9-axis (Acc+Gyro+Mag)', path: '/Meas/IMU9/{rate}', rates: capabilities.imu9?.rates || capabilities.acc?.rates || [13, 26, 52, 104, 208] },
        { id: 'temp', label: 'Temperature (K)', path: '/Meas/Temp', rates: [] },
        { id: 'hr', label: 'Heart Rate (bpm)', path: '/Meas/HR', rates: [] },
      ];
      for (const ch of channels) {
        const logChecked = logPaths.some(p => p.includes(ch.id)) ? 'checked' : '';
        const streamChecked = defaultStream.includes(ch.id) ? 'checked' : '';
        const rateSelect = ch.rates.length > 0 ? `<select id="log-rate-${ch.id}" style="font-size:0.7rem;">${ch.rates.map(r => `<option value="${r}">${r}Hz</option>`).join('')}</select>` : '';
        const streamRateSelect = ch.rates.length > 0 ? `<select id="stream-rate-${ch.id}" style="font-size:0.7rem;">${ch.rates.map(r => `<option value="${r}">${r}Hz</option>`).join('')}</select>` : '';
        logHtml += `<label style="display:block;font-size:0.8rem;"><input type="checkbox" id="log-${ch.id}" ${logChecked}> ${ch.label} ${rateSelect}</label>`;
        streamHtml += `<label style="display:block;font-size:0.8rem;"><input type="checkbox" id="stream-${ch.id}" ${streamChecked}> ${ch.label} ${streamRateSelect}</label>`;
      }
      logEl.innerHTML = logHtml;
      streamEl.innerHTML = streamHtml;
    }

    const ALL_CH_IDS = ['ecg', 'acc', 'gyro', 'magn', 'imu6', 'imu9', 'temp', 'hr'];
    const CH_TEMPLATES = {
      ecg: '/Meas/Ecg/{rate}/mV', acc: '/Meas/Acc/{rate}', gyro: '/Meas/Gyro/{rate}',
      magn: '/Meas/Magn/{rate}', imu6: '/Meas/IMU6/{rate}', imu9: '/Meas/IMU9/{rate}',
      temp: '/Meas/Temp', hr: '/Meas/HR',
    };

    function applyLoggingConfig() {
      const paths = [];
      for (const ch of ALL_CH_IDS) {
        const chk = document.getElementById(`log-${ch}`);
        if (chk?.checked) {
          const templates = CH_TEMPLATES;
          let path = templates[ch];
          const rateSel = document.getElementById(`log-rate-${ch}`);
          if (rateSel) path = path.replace('{rate}', rateSel.value);
          paths.push(path);
        }
      }
      if (viewer) viewer.send({ type: 'device_config', paths });
    }

    function toggleRecording() {
      if (!viewer) return;
      const btn = document.getElementById('btn-record');
      if (btn.textContent.includes('Stop')) {
        viewer.send({ type: 'device_stop' });
      } else {
        viewer.send({ type: 'device_start' });
      }
    }

    function fetchLogs() { if (viewer) viewer.send({ type: 'device_fetch' }); }
    function eraseMem() { if (viewer) viewer.send({ type: 'device_erase' }); }

    function applyStreamConfig() {
      const channels = getStreamChannels();
      if (viewer && channels.length) {
        viewer.send({ type: 'stream_config', channels });
        document.getElementById('status').textContent = `Stream config: ${channels.length} channels configured`;
      }
    }

    // --- Confirmation overlay ---
    let _confirmRequireText = null;
    function showConfirm(title, body, requireText) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-body').innerHTML = body;
      _confirmRequireText = requireText || null;
      const inputWrap = document.getElementById('confirm-input-wrap');
      const input = document.getElementById('confirm-input');
      const okBtn = document.getElementById('confirm-ok-btn');
      if (_confirmRequireText) {
        inputWrap.style.display = '';
        input.value = '';
        input.placeholder = `Type "${_confirmRequireText}" to confirm`;
        input.oninput = () => { okBtn.disabled = input.value.trim().toLowerCase() !== _confirmRequireText; };
        okBtn.disabled = true;
      } else {
        inputWrap.style.display = 'none';
        okBtn.disabled = false;
      }
      document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function respondConfirm(confirmed) {
      document.getElementById('confirm-overlay').style.display = 'none';
      if (viewer) viewer.send({ type: 'confirm_response', confirmed });
    }

    function updateChannelCheckboxesForLive(streamPaths) {
      // In live mode, only show channels that are being streamed
      if (!controlPanel?.metadata) return;
      const el = document.getElementById('controls');
      if (!el) return;
      // Map streaming paths to channel names
      const activeNames = new Set();
      for (const path of streamPaths) {
        const pl = path.toLowerCase();
        if (pl.includes('ecg')) activeNames.add('MeasECGmV');
        if (pl.includes('imu9')) activeNames.add('MeasIMU9');
        if (pl.includes('imu6') && !pl.includes('imu9')) activeNames.add('MeasIMU6');
        if (pl.includes('/acc/')) activeNames.add('MeasAcc');
        if (pl.includes('/gyro/')) activeNames.add('MeasGyro');
        if (pl.includes('temp')) activeNames.add('MeasTemp');
        if (pl.includes('/hr')) activeNames.add('MeasHR');
      }
      // Update checkboxes in control panel
      const checkboxes = el.querySelectorAll('input[type=checkbox]');
      checkboxes.forEach(cb => {
        const label = cb.parentElement?.textContent?.trim() || '';
        const chName = controlPanel.metadata.channels.find(c =>
          label.includes(c.name.split('/').pop()))?.name || '';
        if (activeNames.has(chName)) {
          cb.checked = true;
          cb.disabled = false;
          cb.parentElement.style.opacity = '1';
        } else {
          cb.checked = false;
          cb.disabled = true;
          cb.parentElement.style.opacity = '0.4';
        }
      });
    }

    let _livePaused = false;
    function pauseLive() {
      _livePaused = !_livePaused;
      const btn = document.getElementById('btn-pause');
      if (_livePaused) {
        btn.textContent = '▶';
        btn.title = 'Resume live display';
        btn.style.background = '#22c55e';
        chartRenderer._paused = true;
      } else {
        btn.textContent = '⏸';
        btn.title = 'Pause display';
        btn.style.background = '#f59e0b';
        chartRenderer._paused = false;
      }
    }

    function resetZoom() {
      if (chartRenderer && chartRenderer._chart) {
        chartRenderer._chart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
      }
    }

    window.addEventListener('resize', () => { if (chartRenderer?._chart) chartRenderer._chart.resize(); });

    if (!TOKEN) {
      document.getElementById('device-list').innerHTML = '<span class="error">No token. Use the URL from <code>movesense serve</code>.</span>';
    } else {
      loadDevices();
    }
  </script>
</body>
</html>
